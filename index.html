<!DOCTYPE html>
<html>
<head>
  <title>Pro Video Downloader</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Pro Video Downloader</h2>
  <input id="url" placeholder="Paste YouTube link" />
  <button onclick="download()">Download</button>
</div>

<script>
async function download() {
  const url = document.getElementById("url").value;

  if (!url) {
    alert("Enter a URL");
    return;
  }

  const res = await fetch("/download", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url })
  });

  const data = await res.json();

  if (data.link) {
    // 🔥 WORKING DOWNLOAD
    window.location.href = data.link;
  } else {
    alert(data.error || "Failed");
  }
}
</script>

</body>
</html>
