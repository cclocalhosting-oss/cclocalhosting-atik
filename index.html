<!DOCTYPE html>
<html>
<head>
  <title>Real Video Downloader</title>
</head>

<body style="text-align:center; font-family:Arial;">

  <h1>Video Downloader</h1>

  <input type="text" id="link" placeholder="Paste video link" style="width:300px; padding:10px;">
  <br><br>

  <button onclick="download()" style="padding:10px 20px;">Download</button>

  <div id="result" style="margin-top:20px;"></div>

  <script>
    function download() {
      let url = document.getElementById("link").value;

      if(url === "") {
        alert("Enter link!");
        return;
      }

      // API call
      let api = "https://api.vevioz.com/api/button/mp4?url=" + url;

      document.getElementById("result").innerHTML =
        "<iframe src='" + api + "' width='300' height='200'></iframe>";
    }
  </script>

</body>
</html>
