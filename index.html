<!DOCTYPE html>
        <h1>All Video Downloader</h1>
        <p></p>
        <p></p>
        <p></p>
        <side></side>
        
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px;margin: 5% 0; }
        input { width: 50%; padding: 10px; font-size: 16px;  }
        button { padding: 10px 20px; font-size: 16px; margin-top: 10px; 
        background: rgb(255 122 127 / 80%); }
    </style>
        <div class="input-group">
            <input type="text" id="url" placeholder="🚀" />
            <button onclick="downloadVideo()">🚀 Download Video</button>
        </div>

        <div class="status" id="status"></div>

        



         <h2>🐉</h2>




        <div class="supported">
        </div>
    </div>
    <script>
        async function downloadVideo() {
            const url = document.getElementById("url").value;

            if (!url) {
                document.getElementById("status").innerText = "Enter URL!";
                return;
            }

            document.getElementById("status").innerText = "Downloading...";

            const response = await fetch("/download", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ url })
            });

            if (!response.ok) {
                document.getElementById("status").innerText = "Failed!";
                return;
            }

            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = downloadUrl;
            a.download = "video.mp4";
            document.body.appendChild(a);
            a.click();
            a.remove();

            document.getElementById("status").innerText = "Done!";
        }
    </script>

</body>
</html>
