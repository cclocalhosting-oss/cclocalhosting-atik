<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYSTEM CRITICAL // VIDBREACH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    :root {
      --accent: #ff0000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0000;
      color: var(--accent);
      font-family: 'VT323', monospace;
      overflow: hidden;
      height: 100vh;
      position: relative;
      transition: all 1.2s ease;
    }

    /* Matrix Rain */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      opacity: 0.18;
    }

    .danger-box {
      position: relative;
      z-index: 10;
      max-width: 820px;
      margin: 50px auto;
      padding: 40px 50px;
      background: rgba(20, 0, 0, 0.95);
      border: 4px solid var(--accent);
      box-shadow: 0 0 70px var(--accent),
                  inset 0 0 40px rgba(255, 0, 0, 0.2);
      text-align: center;
      transition: all 1.2s ease;
    }

    .scan-line {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(255,255,255,0.12) 50%
      );
      background-size: 100% 8px;
      animation: scan 3.5s linear infinite;
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
    }

    @keyframes scan {
      0% { background-position: 0 0; }
      100% { background-position: 0 800px; }
    }

    h1 {
      font-size: 4.8rem;
      text-shadow: 0 0 25px var(--accent),
                   0 0 50px var(--accent);
      animation: glitch 0.9s infinite linear alternate;
      margin-bottom: 10px;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-4px, 4px); }
      40% { transform: translate(-4px, -4px); }
      60% { transform: translate(4px, 4px); }
      80% { transform: translate(4px, -4px); }
      100% { transform: translate(0); }
    }

    p {
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 30px;
      text-shadow: 0 0 15px var(--accent);
    }

    input {
      width: 100%;
      padding: 22px 28px;
      margin: 25px 0 35px;
      font-family: 'VT323', monospace;
      font-size: 1.9rem;
      background: #110000;
      border: 3px solid var(--accent);
      color: var(--accent);
      outline: none;
      box-shadow: 0 0 30px var(--accent);
      transition: all 0.6s;
    }

    input:focus {
      box-shadow: 0 0 50px var(--accent);
      transform: scale(1.03);
    }

    .btn {
      padding: 20px 85px;
      font-size: 2.2rem;
      background: #220000;
      color: var(--accent);
      border: 4px solid var(--accent);
      cursor: pointer;
      box-shadow: 0 0 45px var(--accent);
      transition: all 0.5s;
    }

    .btn:hover {
      background: var(--accent);
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 70px var(--accent);
    }

    .console {
      margin-top: 45px;
      background: #0a0000;
      border: 3px solid var(--accent);
      padding: 22px;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 0 35px var(--accent);
      transition: all 1s;
    }

    #logs div {
      margin: 10px 0;
      font-size: 1.65rem;
      animation: logFade 0.7s;
    }

    @keyframes logFade {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <div class="danger-box">
    <div class="scan-line"></div>
    <h1>SYSTEM CRITICAL</h1>
    <p>ALERT: UNAUTHORIZED DOWNLOAD PROTOCOL ACTIVE</p>

    <input type="text" id="url" placeholder="[ENTER VIDEO URL HERE]">

    <button class="btn" onclick="executeRedScript()">EXECUTE BREACH</button>

    <div class="console" id="console">
      <div id="logs"></div>
    </div>
  </div>

  <script>
    // 7 Intense Colors (changes every 1 seconds)
    const colors = [
      '#ff0000',   // Red
      '#ff00ff',   // Magenta
      '#00ffff',   // Cyan
      '#ff8800',   // Orange
      '#aa00ff',   // Purple
      '#00ff88',   // Neon Green
      '#ffff00'    // Yellow
    ];

    let colorIndex = 0;

    function changeColor() {
      colorIndex = (colorIndex + 1) % colors.length;
      const newColor = colors[colorIndex];
      document.documentElement.style.setProperty('--accent', newColor);
    }

    // Auto change color every 1 seconds
    setInterval(changeColor, 10000);

    // Matrix Rain
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$@#";
    const fontSize = 14;
    let columns = canvas.width / fontSize;
    let drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(10, 0,)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = document.documentElement.style.getPropertyValue('--accent');
      ctx.font = `${fontSize}px VT323`;

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
      columns = canvas.width / fontSize;
      drops = Array(Math.floor(columns)).fill(1);
    });

    // Execute Breach Function
    function executeRedScript() {
      const url = document.getElementById('url').value.trim();
      const consoleBox = document.getElementById('console');
      const logs = document.getElementById('logs');

      if (url === "") {
        alert("ERROR: NO LINK DETECTED!");
        return;
      }

      consoleBox.style.display = "block";
      logs.innerHTML = "";

      const messages = [
        "> OVERRIDING SECURITY PROTOCOLS...",
        "> LOCATING ENCRYPTED VIDEO STREAM...",
        "> BYPASSING FIREWALL........ [SUCCESS]",
        "> TUNNELING THROUGH PROXY......",
        "> INITIATING FILE EXTRACTION...",
        "> BREACH SUCCESSFUL • SAVING FILE..."
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (i < messages.length) {
          const div = document.createElement("div");
          div.innerText = messages[i];
          logs.appendChild(div);
          logs.scrollTop = logs.scrollHeight;
          i++;
        } else {
          clearInterval(interval);
          setTimeout(() => {
            window.location.href = "https://9xbuddy.site/process?url=" + encodeURIComponent(url);
          }, 1200);
        }
      }, 650);
    }

    // Enter key support
    document.getElementById('url').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') executeRedScript();
    });
  </script>
</body>
</html>
