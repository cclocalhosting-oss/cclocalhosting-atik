<!DOCTYPE html>
<html>
<head>
    <title>Animated ❤️ Downloader</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* animated gradient */
            background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #38f9d7);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% }
            50% { background-position: 100% }
            100% { background-position: 0% }
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;

            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(79,172,254,0.5);
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #007bff;
        }
    </style>
</head>
</head>
<body>

    <div class="danger-box">
        <div class="scan-line"></div>
        <h1>SYSTEM CRITICAL</h1>
        <p style="font-size: 11px;">ALERT: UNAUTHORIZED DOWNLOADS ACTIVE</p>

        <input type="text" id="url" placeholder="[Atik ❤️ Sharier]">
        
        <button class="btn" onclick="executeRedScript()">Execute Breach</button>

        <div class="console" id="console">
            <div id="logs"></div>
        </div>
    </div>

    <script>
        function executeRedScript() {
            const url = document.getElementById('url').value;
            const consoleBox = document.getElementById('console');
            const logs = document.getElementById('logs');

            if(url === "") {
                alert("ERROR: LINK NOT FOUND!");
                return;
            }

            consoleBox.style.display = "block";
            const messages = [
"> HOSTING SUCCESSFUL.❤️❤️❤️❤️...",
"> Locating encrypted video source...",
"> Bypassing firewall: [❤️❤️❤️❤️]",
"> Tunneling through secure proxy...",
"> Initiating file extraction...",
"> Overriding server protocols..."
        ];

            let i = 0;
            logs.innerHTML = ""; 

            const interval = setInterval(() => {
                if (i < messages.length) {
                    const div = document.createElement("div");
                    div.innerText = messages[i];
                    logs.appendChild(div);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        // Real redirect to download service
                        window.location.href = "https://9xbuddy.com/process?url=" + encodeURIComponent(url);
                    }, 1000);
                }
            }, 700);
        }
    </script>

</body>
</html>
</html>
