<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacking Animation - 7 Rokon Color (Pause/Resume)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Courier New', monospace;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .terminal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 850px;
            background: rgba(0, 15, 0, 0.95);
            border: 3px solid #00ff41;
            box-shadow: 0 0 40px #00ff41;
            padding: 25px;
            z-index: 2;
            border-radius: 8px;
            color: #00ff41;
        }
        .header {
            background: #001100;
            padding: 12px;
            text-align: center;
            font-size: 20px;
            border-bottom: 3px solid #00ff41;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ff41;
        }
        .output {
            height: 280px;
            overflow: hidden;
            font-size: 15px;
            line-height: 1.5;
            text-shadow: 0 0 8px #00ff41;
        }
        .controls {
            text-align: center;
            margin-top: 15px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #ff4081;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #f50057;
        }
        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(0,255,100,0.15), transparent);
            animation: scan 3.5s linear infinite;
            z-index: 3;
            pointer-events: none;
        }
        @keyframes scan { 
            0% {transform: translateY(-100%);} 
            100% {transform: translateY(400%);} 
        }
    </style>
	</head>
</head>

<body>

<div class="container">
    <h2>🎬 Video Downloader</h2>
    
    <input type="text" id="videoUrl" placeholder="Video URL paste korun">
    
    <button onclick="downloadVideo()">Download</button>
    
    <div id="status"></div>
</div>

<script>
function downloadVideo() {
    const url = document.getElementById("videoUrl").value;
    const status = document.getElementById("status");

    if (!url) {
        status.innerText = "⚠️ URL din!";
        return;
    }

    try {
        const a = document.createElement("a");
        a.href = url;
        a.download = "video.mp4";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        status.innerText = "✅ Download start hoyeche!";
    } catch (e) {
        status.innerText = "❌ Download possible na!";
    }
}
</script>

</body>
</html>
