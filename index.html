<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>7 Color Hacker UI</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: #00ff00;
}

/* layout */
#container {
  display: flex;
}

/* left side */
#main {
  width: 65%;
  padding: 20px;
}

/* right panel */
#panel {
  width: 35%;
  border-left: 2px solid;
  padding: 20px;
}

/* 🌈 7 color animation */
.rainbow {
  animation: rainbow 7s infinite;
}

@keyframes rainbow {
  0% { color: red; text-shadow: 0 0 10px red; }
  14% { color: orange; text-shadow: 0 0 10px orange; }
  28% { color: yellow; text-shadow: 0 0 10px yellow; }
  42% { color: lime; text-shadow: 0 0 10px lime; }
  57% { color: cyan; text-shadow: 0 0 10px cyan; }
  71% { color: blue; text-shadow: 0 0 10px blue; }
  85% { color: violet; text-shadow: 0 0 10px violet; }
  100% { color: red; text-shadow: 0 0 10px red; }
}

/* titles */
h1 {
  font-size: 28px;
}

h2 {
  font-size: 20px;
}

/* downloader box */
#downloader {
  margin-top: 20px;
  border: 1px solid;
  padding: 20px;
  width: 350px;
}

/* input */
input {
  width: 100%;
  padding: 10px;
  background: black;
  border: 1px solid;
}

/* button */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: black;
  border: 1px solid;
  cursor: pointer;
}

/* logs */
#logs {
  margin-top: 20px;
  height: 200px;
  overflow-y: auto;
  border-top: 1px solid;
  padding-top: 10px;
}

/* stat */
.stat {
  border: 1px solid;
  padding: 10px;
  margin-top: 10px;
}

/* blink */
.blink {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>

</head>
<body>

<div id="container">

  <!-- LEFT -->
  <div id="main">
    <h1 class="rainbow">⚠ Atik </h1>

    <div id="downloader" class="rainbow">
      <h2 class="rainbow">🎬 All Video Downloader</h2>

      <input class="rainbow" type="text" id="url" placeholder="Paste video link">

      <button class="rainbow" onclick="start()">DOWNLOAD</button>
    </div>

    <div id="logs" class="rainbow"></div>
  </div>

  <!-- RIGHT -->
  <div id="panel">
    <h2 class="rainbow">💻 HACKER PANEL</h2>

    <div class="stat rainbow">Status: <span class="blink">ONLINE</span></div>
    <div class="stat rainbow">Server: <span class="blink">atik</span></div>
    <div class="stat rainbow">Access Level: Bot</div>

    <div class="stat rainbow">
      IP: <span id="ipText">Checking...</span>
    </div>
  </div>

</div>

<script>

// downloader
function start() {
  let url = document.getElementById("url").value;
  let logs = document.getElementById("logs");

  if (!url) {
    alert("Enter link!");
    return;
  }

  let messages = [
    "Connecting...",
    "Bypassing firewall...",
    "Fetching video...",
    "style="--scrollbar-width: 10px; --vh: 9.53px; --composer-text-size: 16px; --message-meta-height: 21px; --message-text-size: 16px; --color-primary: rgb(135,116,225,1); --color-primary-opacity: rgb(131,120,219,0.118); --color-primary-opacity-hover: rgb(131,120,219,0.251); --color-primary-tint: rgb(135,116,225,0.102); --color-primary-shade: rgb(123,113,198,1); --color-primary-shade-rgb: 123,113,198; --color-background: rgb(33,33,33,1); --color-background-compact-menu: rgb(33,33,33,0.867); --color-web-app-browser: rgb(3,3,3,0.561); --color-background-compact-menu-reactions: rgb(33,33,33,0.867); --color-background-compact-menu-hover: rgb(0,0,0,0.4); --color-background-secondary: rgb(15,15,15,1); --color-background-secondary-accent: rgb(25,25,25,1); --color-background-sidebar: rgb(15,15,15,1); --color-background-own: rgb(118,106,200,1); --color-background-own-apple: rgb(118,106,200,1); --color-background-selected: rgb(44,44,44,1); --color-background-own-selected: rgb(101,73,212,1); --color-chat-hover: rgb(44,44,44,1); --color-chat-active: rgb(118,106,200,1); --color-chat-active-greyed: rgb(146,136,211,1); --color-item-hover: rgb(44,44,44,1); --color-item-active: rgb(41,41,41,1); --color-text: rgb(255,255,255,1); --color-text-rgb: 255,255,255; --color-text-secondary: rgb(170,170,170,1); --color-text-secondary-rgb: 170,170,170; --color-icon-secondary: rgb(170,170,170,1); --color-text-secondary-apple: rgb(170,170,170,1); --color-borders: rgb(48,48,48,1); --color-borders-input: rgb(91,91,90,1); --color-dividers: rgb(59,59,61,1); --color-dividers-android: rgb(15,15,15,1); --color-links: rgb(135,116,225,1); --color-gray: rgb(113,117,121,1); --color-list-icon: rgb(162,162,162,1); --color-default-shadow: rgb(16,16,16,0.612); --color-light-shadow: rgb(0,0,0,0.251); --color-green: rgb(135,116,225,1); --color-green-darker: rgb(123,113,198,1); --color-success: rgb(0,199,62,1); --color-text-meta-colored: rgb(131,120,219,1); --color-reply-hover: rgb(39,39,39,1); --color-reply-acti     "Done ✔"
  ];

  let i = 0;
  logs.innerHTML = "";

  const interval = setInterval(() => {
    if (i < messages.length) {
      let div = document.createElement("div");
      div.innerText = messages[i];
      div.classList.add("rainbow");
      logs.appendChild(div);
      logs.scrollTop = logs.scrollHeight;
      i++;
    } else {
      clearInterval(interval);

      setTimeout(() => {
        window.location.href =
  "https://loader.to/api/button/?url=" + encodeURIComponent(url);
      }, 1000);
    }
  }, 600);
}


// fake IP animation
function fakeIP() {
  const ipText = document.getElementById("ipText");

  let steps = [
    "Scanning...",
    "Detecting...",
    "Bypassing...",
    "Connecting...",
    "192.168.0.1 ✔ CONNECTED"
  ];

  let i = 0;

  setInterval(() => {
    ipText.innerText = steps[i];
    i++;
    if (i >= steps.length) i = 0;
  }, 2000);
}

fakeIP();

</script>

</body>
</html>
