<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VidDrop — Universal Video Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #ff3c5f;
    --accent2: #ff7a3c;
    --text: #f0f0f5;
    --muted: #6b6b85;
    --success: #3cffa0;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,60,95,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,60,95,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* Glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(255,60,95,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 60px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 10vw, 96px);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, #ff3c5f, #ff7a3c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(255,60,95,0.35));
  }

  .tagline {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Badges */
  .badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 20px;
    backdrop-filter: blur(20px);
  }

  /* URL input area */
  .url-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .url-input::placeholder { color: var(--muted); }

  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,60,95,0.12);
  }

  .fetch-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 16px 28px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .fetch-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .fetch-btn:active { transform: translateY(0); }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Format selector */
  .format-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .fmt-btn {
    flex: 1;
    min-width: 110px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .fmt-btn.active {
    background: rgba(255,60,95,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .fmt-btn:hover:not(.active) {
    border-color: var(--muted);
    color: var(--text);
  }

  .fmt-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  /* Video preview */
  #preview {
    display: none;
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    gap: 16px;
    align-items: center;
  }

  #preview.show { display: flex; }

  #thumb {
    width: 120px;
    height: 70px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    background: var(--border);
  }

  .preview-info { flex: 1; min-width: 0; }

  .preview-title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .preview-meta {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
  }

  /* Download button */
  .dl-btn {
    width: 100%;
    margin-top: 24px;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: none;
  }

  .dl-btn.show { display: block; }
  .dl-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Progress */
  #progress-area {
    display: none;
    margin-top: 20px;
  }

  #progress-area.show { display: block; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    background: var(--surface);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 12px rgba(255,60,95,0.5);
  }

  /* Status */
  #status {
    margin-top: 16px;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
  }

  #status.success { color: var(--success); }
  #status.error { color: var(--accent); }

  /* Supported platforms */
  .platforms-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 32px;
  }

  .platforms-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .platforms-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .platform {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  .platform-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* Download link */
  #dl-link {
    display: none;
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    background: rgba(60,255,160,0.1);
    border: 1px solid var(--success);
    border-radius: 10px;
    color: var(--success);
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }

  #dl-link.show { display: block; }
  #dl-link:hover { background: rgba(60,255,160,0.18); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">VidDrop</div>
    <div class="tagline">Universal Video Downloader</div>
    <div class="badges">
      <span class="badge">YouTube</span>
      <span class="badge">Instagram</span>
      <span class="badge">TikTok</span>
      <span class="badge">Twitter/X</span>
      <span class="badge">Facebook</span>
      <span class="badge">Vimeo</span>
      <span class="badge">+ 1000 more</span>
    </div>
  </header>

  <div class="card">
    <div class="url-row">
      <input id="url" class="url-input" type="url" placeholder="Paste video URL here…" autocomplete="off"/>
      <button class="fetch-btn" onclick="fetchInfo()">FETCH</button>
    </div>

    <div class="format-row">
      <button class="fmt-btn active" data-fmt="best" onclick="selectFmt(this)">
        <span class="fmt-icon">🎬</span>Best Quality
      </button>
      <button class="fmt-btn" data-fmt="mp4_720" onclick="selectFmt(this)">
        <span class="fmt-icon">📺</span>MP4 720p
      </button>
      <button class="fmt-btn" data-fmt="mp4_1080" onclick="selectFmt(this)">
        <span class="fmt-icon">🖥️</span>MP4 1080p
      </button>
      <button class="fmt-btn" data-fmt="mp3" onclick="selectFmt(this)">
        <span class="fmt-icon">🎵</span>MP3 Audio
      </button>
    </div>

    <div id="preview">
      <img id="thumb" src="" alt="thumbnail"/>
      <div class="preview-info">
        <div class="preview-title" id="vid-title">—</div>
        <div class="preview-meta" id="vid-meta">—</div>
      </div>
    </div>

    <button class="dl-btn" id="dl-btn" onclick="startDownload()">⬇ DOWNLOAD</button>

    <div id="progress-area">
      <div class="progress-label">
        <span id="prog-label">Downloading…</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-fill"></div>
      </div>
    </div>

    <div id="status"></div>
    <a id="dl-link" href="#" download>✅ File Ready — Click to Save</a>
  </div>

  <div class="platforms-card">
    <div class="platforms-title">Supported Platforms</div>
    <div class="platforms-grid">
      <div class="platform"><span class="platform-dot"></span>YouTube</div>
      <div class="platform"><span class="platform-dot"></span>Instagram</div>
      <div class="platform"><span class="platform-dot"></span>TikTok</div>
      <div class="platform"><span class="platform-dot"></span>Twitter / X</div>
      <div class="platform"><span class="platform-dot"></span>Facebook</div>
      <div class="platform"><span class="platform-dot"></span>Vimeo</div>
      <div class="platform"><span class="platform-dot"></span>Dailymotion</div>
      <div class="platform"><span class="platform-dot"></span>Reddit</div>
      <div class="platform"><span class="platform-dot"></span>Twitch</div>
      <div class="platform"><span class="platform-dot"></span>SoundCloud</div>
      <div class="platform"><span class="platform-dot"></span>Bilibili</div>
      <div class="platform"><span class="platform-dot"></span>1000+ more via yt-dlp</div>
    </div>
  </div>
</div>

<script>
  const API = "http://localhost:5000";
  let selectedFmt = "best";
  let pollTimer = null;
  let currentJobId = null;

  function selectFmt(el) {
    document.querySelectorAll(".fmt-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
    selectedFmt = el.dataset.fmt;
  }

  function setStatus(msg, cls = "") {
    const s = document.getElementById("status");
    s.textContent = msg;
    s.className = cls;
  }

  function fmtDuration(sec) {
    if (!sec) return "";
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  async function fetchInfo() {
    const url = document.getElementById("url").value.trim();
    if (!url) { setStatus("Please paste a video URL.", "error"); return; }

    setStatus("⏳ Fetching video info…");
    document.getElementById("preview").classList.remove("show");
    document.getElementById("dl-btn").classList.remove("show");
    document.getElementById("dl-link").classList.remove("show");

    try {
      const res = await fetch(`${API}/info`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.error) { setStatus("❌ " + data.error, "error"); return; }

      document.getElementById("thumb").src = data.thumbnail || "";
      document.getElementById("vid-title").textContent = data.title || "Unknown";
      document.getElementById("vid-meta").textContent =
        `${data.platform || ""} • ${data.uploader || ""} • ${fmtDuration(data.duration)}`;

      document.getElementById("preview").classList.add("show");
      document.getElementById("dl-btn").classList.add("show");
      setStatus("");
    } catch (e) {
      setStatus("❌ Could not connect to server. Make sure app.py is running.", "error");
    }
  }

  async function startDownload() {
    const url = document.getElementById("url").value.trim();
    if (!url) return;

    document.getElementById("dl-btn").disabled = true;
    document.getElementById("dl-link").classList.remove("show");
    document.getElementById("progress-area").classList.add("show");
    document.getElementById("prog-fill").style.width = "0%";
    document.getElementById("prog-pct").textContent = "0%";
    setStatus('<span class="spinner"></span>Starting download…');

    try {
      const res = await fetch(`${API}/download`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, format: selectedFmt })
      });
      const data = await res.json();
      if (data.error) { setStatus("❌ " + data.error, "error"); reset(); return; }

      currentJobId = data.job_id;
      pollProgress(currentJobId);
    } catch (e) {
      setStatus("❌ Could not connect to server.", "error");
      reset();
    }
  }

  function pollProgress(jobId) {
    clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`${API}/progress/${jobId}`);
        const data = await res.json();

        const pct = Math.round(data.percent || 0);
        document.getElementById("prog-fill").style.width = pct + "%";
        document.getElementById("prog-pct").textContent = pct + "%";

        if (data.status === "finished") {
          clearInterval(pollTimer);
          setStatus("✅ Download complete!", "success");
          document.getElementById("prog-fill").style.width = "100%";
          document.getElementById("prog-pct").textContent = "100%";

          const link = document.getElementById("dl-link");
          link.href = `${API}/file/${jobId}`;
          link.classList.add("show");
          document.getElementById("dl-btn").disabled = false;
        } else if (data.status === "error") {
          clearInterval(pollTimer);
          setStatus("❌ " + (data.error || "Download failed."), "error");
          reset();
        } else {
          setStatus('<span class="spinner"></span>Downloading…');
        }
      } catch (e) {
        clearInterval(pollTimer);
        setStatus("❌ Lost connection to server.", "error");
        reset();
      }
    }, 1000);
  }

  function reset() {
    document.getElementById("dl-btn").disabled = false;
  }

  // Allow Enter key on URL input
  document.getElementById("url").addEventListener("keydown", e => {
    if (e.key === "Enter") fetchInfo();
  });
</script>
</body>
</html>
