        body {
            background-color: #050000;

        }

        .danger-box {
            border: 2px solid #ff0000;

            background: rgba(20, 0, 0, 0.95);
            box-shadow: 0 0 25px #ff0000; /* Lal Glow */
            text-align: center;
            position: relative;
        }

        h1 { 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 2px 2px #550000;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #110000;
            border: 1px solid #ff0000;
            color: #ff0000;
            margin-top: 20px;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ff0000;
            color: #000;
            border: none;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #cc0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .console {
            margin-top: 20px;
            text-align: left;
            font-size: 13px;
            height: 120px;
            overflow-y: hidden;
            border-top: 1px solid #ff0000;
            padding-top: 10px;
            display: none;
            color: #ff4d4d;
        }

        /* Scan Animation */
        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.5);

        @keyframes scan {

<style>
    :root {
        --red: #ff0000;
        --dark: #0a0000;
    }

    body {
        background: #020000;
        color: #ff3333;
        font-family: 'Courier New', monospace;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Left & Right Data Stream */
    .data-stream {
        position: absolute;
        top: 0;
        width: 80px;
        height: 100%;
        background: linear-gradient(transparent, rgba(255,0,0,0.15), transparent);
        animation: dataflow 8s linear infinite;
        opacity: 0.4;
        pointer-events: none;
    }
    .data-stream.left  { left: 0; animation-delay: 0s; }
    .data-stream.right { right: 0; animation-delay: 3s; transform: scaleX(-1); }

    @keyframes dataflow {
        0%   { transform: translateY(-100%); }
        100% { transform: translateY(300%); }
    }

    .danger-box {
        border: 4px solid var(--red);
        padding: 40px 35px;
        width: 94%;
        max-width: 540px;
        background: rgba(8, 0, 0, 0.98);
        box-shadow: 
            0 0 60px var(--red),
            0 0 20px rgba(255, 50, 50, 0.6),
            inset 0 0 40px rgba(255, 0, 0, 0.25);
        text-align: center;
        position: relative;
        z-index: 10;
        border-radius: 6px;
        overflow: hidden;
    }

    /* Super Glitch Title */
    h1 {
        font-size: 32px;
        text-transform: uppercase;
        letter-spacing: 8px;
        margin: 0 0 10px 0;
        text-shadow: 
            0 0 10px #ff0000,
            3px 3px 0 #00ffcc,
            -3px -3px 0 #ffff00;
        animation: heavy-glitch 0.6s infinite alternate;
    }

    @keyframes heavy-glitch {
        0%   { transform: translate(0,0) skew(0deg); }
        10%  { transform: translate(-4px, 3px) skew(8deg); }
        20%  { transform: translate(4px, -3px) skew(-8deg); }
        30%  { transform: translate(-2px, 2px); }
        100% { transform: translate(0,0) skew(0deg); }
    }

    .terminal-header {
        font-size: 13px;
        color: #ff6666;
        margin-bottom: 20px;
        letter-spacing: 3px;
        animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
        50% { opacity: 0.3; }
    }

    input {
        width: 100%;
        padding: 18px;
        background: #0f0000;
        border: 3px solid #ff2222;
        color: #ff9999;
        font-size: 17px;
        margin: 25px 0 20px;
        outline: none;
        box-shadow: 0 0 25px rgba(255,0,0,0.6);
        transition: 0.4s;
    }

    input:focus {
        border-color: #ff5555;
        box-shadow: 0 0 40px #ff0000;
        color: #ffffff;
    }

    /* Electric Buttons */
    .btn {
        width: 100%;
        padding: 18px;
        margin: 12px 0;
        background: linear-gradient(180deg, #ff0000, #aa0000);
        color: #000000;
        border: 2px solid #ff5555;
        font-size: 18px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 3px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 30px #ff0000;
        transition: all 0.3s;
    }

    .btn:hover {
        background: linear-gradient(180deg, #ff4444, #ff0000);
        box-shadow: 0 0 50px #ff0000, 0 0 20px #ffff00;
        transform: scale(1.05);
        color: #110000;
    }

    .btn::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -100%;
        width: 50%;
        height: 300%;
        background: linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,0.6),
            transparent
        );
        transition: 0.7s;
    }

    .btn:hover::after {
        left: 200%;
    }

    /* Console */
    .console {
        margin-top: 30px;
        background: #000000;
        border: 2px solid #660000;
        height: 190px;
        overflow-y: auto;
        padding: 15px;
        text-align: left;
        font-size: 14.5px;
        color: #ff7777;
        box-shadow: inset 0 0 25px rgba(255,0,0,0.7);
        display: none;
    }

    /* Progress Bar - Cyber Style */
    #progress {
        height: 10px;
        background: linear-gradient(to right, #ff0000, #ff8800, #ffff00);
        width: 0%;
        margin: 18px 0;
        box-shadow: 0 0 20px #ff0000;
        transition: width 0.6s ease;
    }

    /* Scan Line + CRT */
    .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(transparent, #ff0000, transparent);
        box-shadow: 0 0 15px #ff0000;
        animation: aggressive-scan 1.2s linear infinite;
        z-index: 5;
    }

    @keyframes aggressive-scan {
        0%   { top: -30%; }
        100% { top: 130%; }
    }

    .danger-box::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(255, 0, 0, 0.06) 3px,
            rgba(255, 0, 0, 0.06) 6px
        );
        pointer-events: none;
        animation: crt-flicker 0.12s infinite alternate;
    }

    @keyframes crt-flicker {
        0%   { opacity: 0.92; }
        100% { opacity: 1; }
    }

<body>

    <div class="danger-box">
        <div class="scan-line"></div>
        <h1>SYSTEM CRITICAL</h1>
        <p style="font-size: 11px;">ALERT: UNAUTHORIZED DOWNLOADS ACTIVE</p>

        <input type="text" id="url" placeholder="[INPUT_URL_HERE]">
        
        <button class="btn" onclick="executeRedScript()">Execute Breach</button>

        <div class="console" id="console">
            <div id="logs"></div>
        </div>
    </div>

    <script>
        function executeRedScript() {
            const url = document.getElementById('url').value;
            const consoleBox = document.getElementById('console');
            const logs = document.getElementById('logs');

            if(url === "") {
                alert("ERROR: LINK NOT FOUND!");
                return;
            }

            consoleBox.style.display = "block";
            const messages = [
                "> Overriding server protocols...",
                "> Locating encrypted video source...",
                "> Bypassing firewall: [SUCCESS]",
                "> Tunneling through secure proxy...",
                "> Initiating file extraction...",
                "> BREACH SUCCESSFUL. SAVING FILE..."
            ];

            let i = 0;
            logs.innerHTML = ""; 

            const interval = setInterval(() => {
                if (i < messages.length) {
                    const div = document.createElement("div");
                    div.innerText = messages[i];
                    logs.appendChild(div);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        // Real redirect to download service
                        window.location.href = "https://9xbuddy.com/process?url=" + encodeURIComponent(url);
                    }, 1000);
                }
            }, 700);
        }
    </script>
