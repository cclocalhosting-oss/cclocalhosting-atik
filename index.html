<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hacker Downloader</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#terminal {
  position: absolute;
  top: 20px;
  left: 20px;
}

h1 {
  color: red;
}

input {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  width: 300px;
}

button {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  cursor: pointer;
}

button:hover {
  background: #00ff00;
  color: black;
}

#logs {
  margin-top: 15px;
}
</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div id="terminal">
  <h1>⚠ SYSTEM ACCESS</h1>

  <input type="text" id="url" placeholder="Enter video link">
  <button onclick="start()">RUN</button>

  <div id="logs"></div>
</div>

<script>
// matrix animation
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for(let x=0; x<columns; x++) drops[x]=1;

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#0f0";
  ctx.font = fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(draw, 33);

// your logic added
function start() {
  let url = document.getElementById("url").value;
  let logs = document.getElementById("logs");

  if (!url) {
    alert("Enter link!");
    return;
  }

  let messages = [
    "Connecting to server...",
    "Bypassing security...",
    "Fetching video data...",
    "Preparing download...",
    "Almost done..."
  ];

  let i = 0;
  logs.innerHTML = "";

  const interval = setInterval(() => {
    if (i < messages.length) {
      const div = document.createElement("div");
      div.innerText = messages[i];
      logs.appendChild(div);
      i++;
    } else {
      clearInterval(interval);

      setTimeout(() => {
        // redirect to downloader
        window.location.href = "https://9xbuddy.com/process?url=" + encodeURIComponent(url);
      }, 1000);
    }
  }, 700);
}
</script>

</body>
</html>
