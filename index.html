<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hacker Screen</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* matrix rain */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* terminal box */
#terminal {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 90%;
  height: 90%;
}

h1 {
  color: red;
}

/* input style */
input {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  width: 300px;
  margin-top: 10px;
}

button {
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 10px;
  cursor: pointer;
  margin-left: 5px;
}

button:hover {
  background: #00ff00;
  color: black;
}
</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div id="terminal">
  <h1>⚠ SYSTEM...</h1>

  <!-- link input -->
  <input type="text" id="url" placeholder="Enter video link here">
  <button onclick="openLink()">RUN</button>

  <p id="text"></p>
</div>

<script>
// matrix animation
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for(let x=0; x<columns; x++)
  drops[x]=1;

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#0f0";
  ctx.font = fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw, 33);

// typing effect
let message = "Connecting...\nBypassing firewall...\nAccess Granted!\nReady for input...\n";
let i = 0;

function typeEffect(){
  if(i < message.length){
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}

typeEffect();

// open link function
function openLink() {
  let url = document.getElementById("url").value;

  if (!url) {
    alert("Enter a link!");
    return;
  }

  window.open(url, "_blank");
}
</script>

</body>
</html>
