<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Alert Downloader</title>
    <style>
        /* Red Hacker Theme CSS */
        body {
            background-color: #050000;
            color: #ff0000; /* Lal Rong */
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .danger-box {
            border: 2px solid #ff0000;
            padding: 25px;
            width: 85%;
            max-width: 400px;
            background: rgba(20, 0, 0, 0.95);
            box-shadow: 0 0 25px #ff0000; /* Lal Glow */
            text-align: center;
            position: relative;
        }

        h1 { 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 2px 2px #550000;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #110000;
            border: 1px solid #ff0000;
            color: #ff0000;
            margin-top: 20px;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ff0000;
            color: #000;
            border: none;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #cc0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .console {
            margin-top: 20px;
            text-align: left;
            font-size: 13px;
            height: 120px;
            overflow-y: hidden;
            border-top: 1px solid #ff0000;
            padding-top: 10px;
            display: none;
            color: #ff4d4d;
        }

        /* Scan Animation */
        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
    <style>
    /* RED ALERT - Enhanced Cyberpunk Hacker Theme */
    body {
        background: #050000;
        color: #ff0000;
        font-family: 'Courier New', monospace;
        margin: 0;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* Matrix Rain Background */
    .matrix-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        opacity: 0.12;
        z-index: -1;
    }

    .danger-box {
        border: 3px solid #ff0000;
        padding: 35px 30px;
        width: 92%;
        max-width: 520px;
        background: rgba(12, 0, 0, 0.96);
        box-shadow: 
            0 0 50px #ff0000,
            inset 0 0 30px rgba(255, 0, 0, 0.3);
        text-align: center;
        position: relative;
        z-index: 2;
        border-radius: 4px;
    }

    /* Glitch Title */
    h1 {
        font-size: 28px;
        text-transform: uppercase;
        letter-spacing: 6px;
        text-shadow: 
            0 0 10px #ff0000,
            2px 2px 0 #00ff00,
            -2px -2px 0 #ffff00;
        animation: glitch 0.8s infinite alternate;
        margin: 0 0 8px 0;
    }

    @keyframes glitch {
        0%   { transform: translate(0); }
        20%  { transform: translate(-3px, 3px); }
        40%  { transform: translate(-3px, -3px); }
        60%  { transform: translate(3px, 3px); }
        80%  { transform: translate(3px, -3px); }
        100% { transform: translate(0); }
    }

    p {
        font-size: 12px;
        margin: 8px 0 20px;
        opacity: 0.9;
        text-shadow: 0 0 8px #ff0000;
    }

    input {
        width: 100%;
        padding: 16px;
        background: #0a0000;
        border: 2px solid #ff3333;
        color: #ff6666;
        font-size: 16px;
        margin: 20px 0;
        outline: none;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        transition: all 0.3s;
    }

    input:focus {
        border-color: #ff0000;
        box-shadow: 0 0 25px #ff0000;
        color: #ffaaaa;
    }

    /* Neon Buttons */
    .btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(#ff0000, #cc0000);
        color: #000;
        border: none;
        margin: 12px 0;
        font-weight: bold;
        font-size: 17px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 0 20px #ff0000;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
    }

    .btn:hover {
        background: linear-gradient(#ff3333, #ff0000);
        box-shadow: 0 0 35px #ff0000;
        transform: translateY(-3px) scale(1.03);
        color: #110000;
    }

    .btn::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 40%;
        height: 200%;
        background: rgba(255,255,255,0.3);
        transform: skewX(-25deg);
        transition: 0.6s;
        opacity: 0;
    }

    .btn:hover::before {
        opacity: 1;
        left: 120%;
    }

    /* Console */
    .console {
        margin-top: 25px;
        text-align: left;
        font-size: 14px;
        height: 180px;
        overflow-y: auto;
        border-top: 3px double #ff0000;
        padding: 15px;
        background: rgba(0,0,0,0.75);
        color: #ff7777;
        box-shadow: inset 0 0 15px rgba(255,0,0,0.5);
        display: none;
    }

    /* Progress Bar */
    #progress {
        height: 8px;
        background: linear-gradient(to right, #ff0000, #ff6666);
        width: 0%;
        margin: 15px 0;
        box-shadow: 0 0 15px #ff0000;
        transition: width 0.5s linear;
    }

    /* CRT Scanlines + Noise */
    .scan-line {
        width: 100%;
        height: 4px;
        background: linear-gradient(transparent, rgba(255,0,0,0.6), transparent);
        position: absolute;
        top: 0;
        left: 0;
        animation: scan 1.5s linear infinite;
        pointer-events: none;
        box-shadow: 0 0 12px #ff0000;
    }

    @keyframes scan {
        0%   { top: -20%; }
        100% { top: 120%; }
    }

    /* Subtle CRT flicker */
    .danger-box::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: repeating-linear-gradient(
            transparent 0px,
            transparent 2px,
            rgba(255,0,0,0.03) 2px,
            rgba(255,0,0,0.03) 4px
        );
        pointer-events: none;
        animation: flicker 0.15s infinite alternate;
        z-index: 1;
    }

    @keyframes flicker {
        0%   { opacity: 0.95; }
        100% { opacity: 1; }
    }
</style>
</head>
<body>

    <div class="danger-box">
        <div class="scan-line"></div>
        <h1>SYSTEM CRITICAL</h1>
        <p style="font-size: 11px;">ALERT: UNAUTHORIZED DOWNLOADS ACTIVE</p>

        <input type="text" id="url" placeholder="[INPUT_URL_HERE]">
        
        <button class="btn" onclick="executeRedScript()">Execute Breach</button>

        <div class="console" id="console">
            <div id="logs"></div>
        </div>
    </div>

    <script>
        function executeRedScript() {
            const url = document.getElementById('url').value;
            const consoleBox = document.getElementById('console');
            const logs = document.getElementById('logs');

            if(url === "") {
                alert("ERROR: LINK NOT FOUND!");
                return;
            }

            consoleBox.style.display = "block";
            const messages = [
                "> Overriding server protocols...",
                "> Locating encrypted video source...",
                "> Bypassing firewall: [SUCCESS]",
                "> Tunneling through secure proxy...",
                "> Initiating file extraction...",
                "> BREACH SUCCESSFUL. SAVING FILE..."
            ];

            let i = 0;
            logs.innerHTML = ""; 

            const interval = setInterval(() => {
                if (i < messages.length) {
                    const div = document.createElement("div");
                    div.innerText = messages[i];
                    logs.appendChild(div);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        // Real redirect to download service
                        window.location.href = "https://9xbuddy.com/process?url=" + encodeURIComponent(url);
                    }, 1000);
                }
            }, 700);
        }
    </script>

</body>
</html>
