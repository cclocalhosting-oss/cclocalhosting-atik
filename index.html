<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Alert Downloader</title>
    <style>
        /* Red Hacker Theme CSS */
        body {
            background-color: #050000;
            color: #ff0000; /* Lal Rong */
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .danger-box {
            border: 2px solid #ff0000;
            padding: 25px;
            width: 85%;
            max-width: 400px;
            background: rgba(20, 0, 0, 0.95);
            box-shadow: 0 0 25px #ff0000; /* Lal Glow */
            text-align: center;
            position: relative;
        }

        h1 { 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 2px 2px #550000;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #110000;
            border: 1px solid #ff0000;
            color: #ff0000;
            margin-top: 20px;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ff0000;
            color: #000;
            border: none;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #cc0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .console {
            margin-top: 20px;
            text-align: left;
            font-size: 13px;
            height: 120px;
            overflow-y: hidden;
            border-top: 1px solid #ff0000;
            padding-top: 10px;
            display: none;
            color: #ff4d4d;
        }

        /* Scan Animation */
        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="danger-box">
        <div class="scan-line"></div>
        <h1>SYSTEM CRITICAL</h1>
        <p style="font-size: 11px;">ALERT: UNAUTHORIZED DOWNLOADS ACTIVE</p>

        <input type="text" id="url" placeholder="[INPUT_URL_HERE]">
        
        <button class="btn" onclick="executeRedScript()">Execute Breach</button>

        <div class="console" id="console">
            <div id="logs"></div>
        </div>
    </div>

    <script>
        function executeRedScript() {
            const url = document.getElementById('url').value;
            const consoleBox = document.getElementById('console');
            const logs = document.getElementById('logs');

            if(url === "") {
                alert("ERROR: LINK NOT FOUND!");
                return;
            }

            consoleBox.style.display = "block";
            const messages = [
                "> Overriding server protocols...",
                "> Locating encrypted video source...",
                "> Bypassing firewall: [SUCCESS]",
                "> Tunneling through secure proxy...",
                "> Initiating file extraction...",
                "> BREACH SUCCESSFUL. SAVING FILE..."
            ];

            let i = 0;
            logs.innerHTML = ""; 

            const interval = setInterval(() => {
                if (i < messages.length) {
                    const div = document.createElement("div");
                    div.innerText = messages[i];
                    logs.appendChild(div);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        // Real redirect to download service
                        window.location.href = "https://9xbuddy.com/process?url=" + encodeURIComponent(url);
                    }, 1000);
                }
            }, 700);
        }
    </script>

</body>

<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cc Direct Video Downloader</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { font-family: Arial; background: #111; color: #fff; text-align: center; padding: 30px; }
    h1 { color: #ff4081; }
    input { width: 70%; padding: 15px; font-size: 18px; background: #222; color: white; border: 2px solid #ff4081; border-radius: 8px; }
    button { padding: 15px 30px; margin: 10px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
    .btn-play { background: #ff4081; color: white; }
    .btn-down { background: #00e676; color: black; }
    video { width: 90%; max-width: 800px; margin: 20px auto; border: 4px solid #ff4081; border-radius: 12px; }
    #status { margin: 15px; font-size: 20px; }
  </style>
</head>
<body>
  <h1>🎥 Cc Direct Downloader (m3u8 → MP4)</h1>
  <input type="text" id="url" placeholder="m3u8 লিংক পেস্ট করো" />
  <br><br>
  <button class="btn-play" onclick="playVideo()">▶️ Play Video</button>
  <button class="btn-down" onclick="startDownload()">⬇️ Direct Download as MP4</button>

  <div id="status"></div>
  <video id="player" controls></video>

  <script>
    let hls;
    const video = document.getElementById('player');
    const status = document.getElementById('status');

    function playVideo() {
      const url = document.getElementById('url').value.trim();
      if (!url) return alert("লিংক দাও ভাই!");

      if (hls) hls.destroy();
      
      if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        status.textContent = "✅ প্লে হচ্ছে...";
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        status.textContent = "✅ প্লে হচ্ছে (Safari)";
      }
    }

    // Direct Download (সব segment এক করে MP4 বানানোর চেষ্টা)
    async function startDownload() {
      const m3u8Url = document.getElementById('url').value.trim();
      if (!m3u8Url) return alert("প্রথমে m3u8 লিংক দাও!");

      status.textContent = "⏳ সব segment ডাউনলোড হচ্ছে... (ধৈর্য ধরো)";
      
      try {
        // m3u8 ফাইল পড়া
        const response = await fetch(m3u8Url);
        const text = await response.text();
        
        const segments = text.split('\n')
          .filter(line => line.endsWith('.ts') || line.endsWith('.m4s'))
          .map(line => {
            if (line.startsWith('http')) return line;
            return m3u8Url.substring(0, m3u8Url.lastIndexOf('/')) + '/' + line;
          });

        if (segments.length === 0) {
          status.textContent = "❌ কোনো segment পাওয়া যায়নি";
          return;
        }

        status.textContent = `✅ ${segments.length} টা segment পাওয়া গেছে। ডাউনলোড শুরু...`;

        const blobs = [];
        for (let i = 0; i < segments.length; i++) {
          const segRes = await fetch(segments[i]);
          const blob = await segRes.blob();
          blobs.push(blob);
          status.textContent = `Downloading... ${i+1}/${segments.length}`;
        }

        // সব blob এক করে mp4 বানানো (সিম্পল concat, anime-এর জন্য প্রায়ই কাজ করে)
        const finalBlob = new Blob(blobs, { type: 'video/mp4' });
        const downloadUrl = URL.createObjectURL(finalBlob);

        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = `anime_video_${Date.now()}.mp4`;
        a.click();

        status.textContent = "🎉 ডাউনলোড সম্পূর্ণ! ফাইল সেভ হয়েছে।";
        
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Error: " + err.message + " (বড় ভিডিও হলে extension ব্যবহার করো)";
      }
    }
  </script>
</body>
</html>
