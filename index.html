<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>7 Color Hacker UI</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: #00ff00;
}

/* layout */
#container {
  display: flex;
}

/* left side */
#main {
  width: 65%;
  padding: 20px;
}

/* right panel */
#panel {
  width: 35%;
  border-left: 2px solid;
  padding: 20px;
}

/* 🌈 7 color animation */
.rainbow {
  animation: rainbow 7s infinite;
}

@keyframes rainbow {
  0% { color: red; text-shadow: 0 0 10px red; }
  14% { color: orange; text-shadow: 0 0 10px orange; }
  28% { color: yellow; text-shadow: 0 0 10px yellow; }
  42% { color: lime; text-shadow: 0 0 10px lime; }
  57% { color: cyan; text-shadow: 0 0 10px cyan; }
  71% { color: blue; text-shadow: 0 0 10px blue; }
  85% { color: violet; text-shadow: 0 0 10px violet; }
  100% { color: red; text-shadow: 0 0 10px red; }
}

/* titles */
h1 {
  font-size: 28px;
}

h2 {
  font-size: 20px;
}

/* downloader box */
#downloader {
  margin-top: 20px;
  border: 1px solid;
  padding: 20px;
  width: 350px;
}

/* input */
input {
  width: 100%;
  padding: 10px;
  background: black;
  border: 1px solid;
}

/* button */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: black;
  border: 1px solid;
  cursor: pointer;
}

/* logs */
#logs {
  margin-top: 20px;
  height: 200px;
  overflow-y: auto;
  border-top: 1px solid;
  padding-top: 10px;
}

/* stat */
.stat {
  border: 1px solid;
  padding: 10px;
  margin-top: 10px;
}

/* blink */
.blink {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>

</head>
<body>

<div id="container">

  <!-- LEFT -->
  <div id="main">
    <h1 class="rainbow">⚠ Atik </h1>

    <div id="downloader" class="rainbow">
      <h2 class="rainbow">🎬 All Video Downloader</h2>

      <input class="rainbow" type="text" id="url" placeholder="Paste video link">

      <button class="rainbow" onclick="start()">DOWNLOAD</button>
    </div>

    <div id="logs" class="rainbow"></div>
  </div>

  <!-- RIGHT -->
  <div id="panel">
    <h2 class="rainbow">💻 HACKER PANEL</h2>

    <div class="stat rainbow">Status: <span class="blink">ONLINE</span></div>
    <div class="stat rainbow">Server: <span class="blink">atik</span></div>
    <div class="stat rainbow">Access Level: Bot</div>

    <div class="stat rainbow">
      IP: <span id="ipText">Checking...</span>
    </div>
  </div>

</div>

<script>

// downloader
function start() {
  let url = document.getElementById("url").value;
  let logs = document.getElementById("logs");

  if (!url) {
    alert("Enter link!");
    return;
  }

  let messages = [
    "Connecting...",
    "Bypassing firewall...",
    "Fetching video...",
    "Preparing download...",
    "Done ✔"
  ];

  let i = 0;
  logs.innerHTML = "";

  const interval = setInterval(() => {
    if (i < messages.length) {
      let div = document.createElement("div");
      div.innerText = messages[i];
      div.classList.add("rainbow");
      logs.appendChild(div);
      logs.scrollTop = logs.scrollHeight;
      i++;
    } else {
      clearInterval(interval);

      setTimeout(() => {
        window.location.href =
  "https://loader.to/api/button/?url=" + encodeURIComponent(url);
      }, 1000);
    }
  }, 600);
}


// fake IP animation
function fakeIP() {
  const ipText = document.getElementById("ipText");

  let steps = [
    "Scanning...",
    "Detecting...",
    "Bypassing...",
    "Connecting...",
    "192.168.0.1 ✔ CONNECTED"
  ];

  let i = 0;

  setInterval(() => {
    ipText.innerText = steps[i];
    i++;
    if (i >= steps.length) i = 0;
  }, 2000);
}

fakeIP();

</script>

</body>
</html>
